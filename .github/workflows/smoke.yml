name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: CLI help
        run: python scripts/context_bouncer.py --help
      - name: Scan self
        run: python scripts/context_bouncer.py scan --repo . --limit 5
      - name: Fresh command
        run: python scripts/context_bouncer.py fresh-cmd --tool both --cwd .
