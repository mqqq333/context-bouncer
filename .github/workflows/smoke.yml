name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: CLI help
        run: python scripts/context_bouncer.py --help
      - name: Benchmark script help
        run: |
          python scripts/prepare_benchmark.py --help
          python scripts/summarize_benchmark.py --help
          python scripts/import_usage.py --help
          python scripts/prepare_usage_templates.py --help
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Scan self
        run: python scripts/context_bouncer.py scan --repo . --limit 5
      - name: Fresh command
        run: python scripts/context_bouncer.py fresh-cmd --tool both --cwd .
